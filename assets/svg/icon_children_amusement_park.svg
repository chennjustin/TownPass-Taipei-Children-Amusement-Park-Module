<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Taipei Children's Amusement Park Icon</title>
  <desc>A colorful SVG icon representing a children's amusement park with a ferris wheel, carousel tent, roller coaster, and cheerful entrance.</desc>

  <defs>
    <linearGradient id="sky" x1="256" y1="40" x2="256" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DFF6FF"/>
      <stop offset="1" stop-color="#FFF7D6"/>
    </linearGradient>
    <linearGradient id="gate" x1="256" y1="248" x2="256" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8A80"/>
      <stop offset="1" stop-color="#FF5252"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#25556B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <circle cx="86" cy="92" r="20" fill="#FFD54F"/>
  <circle cx="422" cy="90" r="12" fill="#FFB74D"/>
  <circle cx="453" cy="137" r="8" fill="#81C784"/>

  <!-- clouds -->
  <path d="M75 149c0-14 11-25 25-25 5 0 10 1 14 4 7-13 20-22 36-22 23 0 42 19 42 42h18c13 0 24 11 24 24s-11 24-24 24H82c-14 0-26-11-26-25 0-12 8-22 19-22Z" fill="white" opacity=".9"/>
  <path d="M337 142c0-11 9-20 20-20 4 0 8 1 11 3 6-10 16-16 29-16 18 0 33 14 33 32h15c11 0 20 9 20 20s-9 20-20 20H343c-12 0-22-10-22-22 0-10 7-18 16-21Z" fill="white" opacity=".86"/>

  <!-- roller coaster track -->
  <path d="M40 253c61-75 107-78 157-12 39 51 75 51 114 0 48-63 91-66 161 11" stroke="#5E97F6" stroke-width="16" stroke-linecap="round"/>
  <path d="M40 282c61-75 107-78 157-12 39 51 75 51 114 0 48-63 91-66 161 11" stroke="#90CAF9" stroke-width="8" stroke-linecap="round"/>
  <path d="M104 214v87M184 213v107M264 221v99M344 213v108M424 221v91" stroke="#6D4C41" stroke-width="8" stroke-linecap="round" opacity=".65"/>

  <!-- ferris wheel -->
  <g filter="url(#softShadow)">
    <circle cx="165" cy="270" r="74" fill="#FFFFFF" stroke="#455A64" stroke-width="10"/>
    <circle cx="165" cy="270" r="12" fill="#455A64"/>
    <path d="M165 196v148M91 270h148M113 218l104 104M217 218 113 322" stroke="#455A64" stroke-width="6" stroke-linecap="round"/>
    <g fill="#FFCA28" stroke="#455A64" stroke-width="4">
      <rect x="153" y="182" width="24" height="22" rx="6"/>
      <rect x="153" y="336" width="24" height="22" rx="6"/>
      <rect x="77" y="258" width="24" height="22" rx="6"/>
      <rect x="229" y="258" width="24" height="22" rx="6"/>
    </g>
    <g fill="#EC407A" stroke="#455A64" stroke-width="4">
      <rect x="102" y="205" width="24" height="22" rx="6" transform="rotate(-45 114 216)"/>
      <rect x="204" y="307" width="24" height="22" rx="6" transform="rotate(-45 216 318)"/>
      <rect x="204" y="205" width="24" height="22" rx="6" transform="rotate(45 216 216)"/>
      <rect x="102" y="307" width="24" height="22" rx="6" transform="rotate(45 114 318)"/>
    </g>
  </g>

  <!-- central entrance / amusement tent -->
  <g filter="url(#softShadow)">
    <path d="M256 176 138 328h236L256 176Z" fill="#FFFFFF"/>
    <path d="M256 176 216 328h80L256 176Z" fill="#FF7043"/>
    <path d="M138 328 256 176l-6 152H138Z" fill="#FFD54F"/>
    <path d="M374 328 256 176l6 152h112Z" fill="#4FC3F7"/>
    <path d="M256 176 138 328h236L256 176Z" stroke="#37474F" stroke-width="10" stroke-linejoin="round"/>
    <path d="M136 328h240v104H136V328Z" fill="url(#gate)" stroke="#37474F" stroke-width="10"/>
    <path d="M202 432v-58c0-30 24-54 54-54s54 24 54 54v58H202Z" fill="#FFF3E0" stroke="#37474F" stroke-width="10"/>
    <path d="M256 320v112" stroke="#37474F" stroke-width="8"/>
    <path d="M158 358h33M321 358h33" stroke="#FFF59D" stroke-width="14" stroke-linecap="round"/>
    <text x="256" y="300" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="24" font-weight="700" fill="#37474F">Rĺ°</text>
  </g>

  <!-- carousel horse -->
  <g transform="translate(330 340)" filter="url(#softShadow)">
    <path d="M49 2v92" stroke="#5D4037" stroke-width="8" stroke-linecap="round"/>
    <path d="M12 42c9-25 44-28 62-9 7 7 16 9 27 6 0 21-11 39-35 43l-8 18H35l6-19C18 76 4 63 12 42Z" fill="#FFFFFF" stroke="#37474F" stroke-width="8" stroke-linejoin="round"/>
    <path d="M67 30c14-16 28-10 33 9" stroke="#37474F" stroke-width="8" stroke-linecap="round"/>
    <circle cx="69" cy="43" r="4" fill="#37474F"/>
    <path d="M29 45c18 9 39 9 58 0" stroke="#FF80AB" stroke-width="8" stroke-linecap="round"/>
    <path d="M33 100h45" stroke="#37474F" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- children balloons -->
  <g>
    <path d="M86 370c-10 32-3 55 23 70" stroke="#607D8B" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="82" cy="350" rx="18" ry="24" fill="#AB47BC" stroke="#37474F" stroke-width="5"/>
    <path d="M108 386c-7 20-1 37 16 49" stroke="#607D8B" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="112" cy="368" rx="15" ry="20" fill="#26C6DA" stroke="#37474F" stroke-width="5"/>
  </g>

  <!-- ground -->
  <path d="M64 432c54-20 101-21 153 0 43 18 86 18 128 0 42-18 75-18 103 0v40H64v-40Z" fill="#81C784"/>
  <path d="M96 454h320" stroke="#2E7D32" stroke-width="8" stroke-linecap="round" opacity=".55"/>
</svg>
